<!DOCTYPE html>
<html>
<head>
  <title>ILMSW.COM</title>
  <link rel="icon" type="image/x-icon" href="/favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>

/* Make html and body fill the viewport exactly, no scrolling */
html, body {
  height: 100vh;
  margin: 0;
  padding: 0;
  overflow: hidden;
}

body {
  background-color: #94ffda;
  display: flex;           /* stack children vertically */
  flex-direction: column;
}

h1 {
  font-family: Arial, sans-serif;
  font-size: clamp(20px, 6vw, 80px);
  color: #ff4646;
  text-shadow: 0px 0px 3px white;
  margin: 0; /* prevent h1's default margin adding extra height */
}

p {
  font-family: times new roman, sans serif;
  font-size: clamp(10px, 3vw, 30px);
  margin: 0; /* prevent p's default margin adding extra height */
}

/* Spacers are collapsed — no room for them in a 10/80/10 split */
.spacer, .spacerLong {
  display: none;
}

.text {
  flex: 0 0 10vh;      /* fixed 10% of viewport height, won't grow or shrink */
  display: flex;
  align-items: center; /* vertically centre content within the 10vh */
  justify-content: center;
  text-align: center;
}

.vidDiv {
  flex: 0 0 80vh;      /* fixed 80% of viewport height */
  background-color: #94ffda;
  text-align: center;
  padding: 10px;
  box-sizing: border-box; /* padding is included within the 80vh, not added on top */
  box-shadow: 1px 1px 5px #8d7881 inset;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

.vidDiv video {
  height: 100%;      /* fill the div's height exactly */
  width: auto;       /* let width follow the video's aspect ratio */
  max-width: 100%;   /* but never wider than the div */
  display: block;
}

</style>
</head>
<body>

<div class="text">
  <h1><b>ilovemystinkywhore.com</b></h1>
</div>

<div class="vidDiv">
  <video autoplay playsinline muted loop>
    <source src="whoredance_720.mp4" type="video/mp4">
  </video>
</div>

<div class="text">
  <p>All designs © Stinky Whore Enterprises <script>document.write(new Date().getFullYear())</script><br>Video recorded by God.</p>
</div>

</body>
</html>
